# Reduced MaxMetaspaceSize from 4G (overkill) to 512M
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Disable parallel execution to save RAM/CPU on low-end machines
org.gradle.parallel=false

# Limit the number of worker threads (CPU cores used by Gradle)
org.gradle.workers.max=2

# Enable caching to speed up subsequent builds
org.gradle.caching=true

# Standard Android properties
android.useAndroidX=true
android.enableJetifier=true
